name: Create PDF Release

on:
  push:
    tags:
      - "v*" # Trigger on tags starting with v (e.g. v1.0, v20.15.10)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4

      - name: Cache Tectonic packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/Tectonic
          key: ${{ runner.os }}-tectonic-${{ hashFiles('**/*.tex', '**/*.bib') }}
          restore-keys: |
            ${{ runner.os }}-tectonic-

      - name: Compile LaTeX documents
        run: |
          make all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.pdf
